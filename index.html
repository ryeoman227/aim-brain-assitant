<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AiM BRAiN Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1117;
    --surface:  #181c27;
    --surface2: #13161f;
    --border:   #252b3b;
    --border2:  #2a3347;
    --text1:    #e2e8f0;
    --text2:    #94a3b8;
    --text3:    #475569;
    --blue:     #1d4ed8;
    --blue-h:   #2563eb;
    --blue-lt:  #bfdbfe;
    --blue-dim: #1e3a6e;
    --blue-bd:  #2563eb44;
    --pill-bg:  #0d1e35;
    --pill-bd:  #1e3a5f;
    --pill-tx:  #60a5fa;
    --green:    #22c55e;
    --green-bg: #14532d;
    --bot-bg:   #0d1e35;
    --bot-bd:   #1e3a5f;
    --bot-tx:   #60a5fa;
    --user-bg:  #1e2535;
    --user-bd:  #2a3347;
    --user-tx:  #64748b;
    --sug-bg:   #13161f;
    --sug-bd:   #252b3b;
    --sug-tx:   #64748b;
    --bubble-bot: #1a1f2e;
    --bubble-user: #1e3a6e;
    --radius:   12px;
    --radius-sm: 8px;
  }

  /* Light mode overrides — ready for when you want it */
  @media (prefers-color-scheme: light) {
    :root {
      --bg:        #f8fafc;
      --surface:   #ffffff;
      --surface2:  #f1f5f9;
      --border:    #e2e8f0;
      --border2:   #cbd5e1;
      --text1:     #0f172a;
      --text2:     #475569;
      --text3:     #94a3b8;
      --blue:      #1d4ed8;
      --blue-h:    #1e40af;
      --blue-lt:   #1e3a8a;
      --blue-dim:  #eff6ff;
      --blue-bd:   #93c5fd;
      --pill-bg:   #eff6ff;
      --pill-bd:   #bfdbfe;
      --pill-tx:   #1e40af;
      --green:     #16a34a;
      --green-bg:  #dcfce7;
      --bot-bg:    #eff6ff;
      --bot-bd:    #bfdbfe;
      --bot-tx:    #1e40af;
      --user-bg:   #f8fafc;
      --user-bd:   #e2e8f0;
      --user-tx:   #64748b;
      --sug-bg:    #f8fafc;
      --sug-bd:    #e2e8f0;
      --sug-tx:    #64748b;
      --bubble-bot:  #f1f5f9;
      --bubble-user: #dbeafe;
    }
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'DM Sans', 'Segoe UI', sans-serif;
    color: var(--text1);
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── Layout ─────────────────────────────────── */
  .app {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 1.5rem 1rem 1rem;
  }

  .card {
    width: 100%;
    max-width: 720px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex: 1;
    min-height: 0;
  }

  /* ── Header ─────────────────────────────────── */
  .header {
    padding: .875rem 1.25rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .badge {
    width: 36px; height: 36px;
    border-radius: 9px;
    background: var(--bot-bg);
    border: 1px solid var(--bot-bd);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .header-text { flex: 1; min-width: 0; }
  .header-title { font-size: 14px; font-weight: 600; color: var(--text1); }
  .header-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 2px var(--green-bg);
    flex-shrink: 0;
  }

  /* ── Chat area ───────────────────────────────── */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 1.25rem .5rem;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-height: 0;
  }
  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }
  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .avatar.bot  { background: var(--bot-bg);  border: 1px solid var(--bot-bd);  color: var(--bot-tx); }
  .avatar.user { background: var(--user-bg); border: 1px solid var(--user-bd); color: var(--user-tx); }

  .msg-content { max-width: 80%; display: flex; flex-direction: column; gap: 5px; }
  .msg-row.user .msg-content { align-items: flex-end; }

  .bubble {
    padding: 9px 13px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .bubble.bot  {
    background: var(--bubble-bot);
    border: 1px solid var(--border);
    color: var(--text1);
    border-bottom-left-radius: 4px;
  }
  .bubble.user {
    background: var(--bubble-user);
    border: 1px solid var(--blue-bd);
    color: var(--blue-lt);
    border-bottom-right-radius: 4px;
  }

  /* ── Source pills ────────────────────────────── */
  .sources { display: flex; flex-wrap: wrap; gap: 5px; }
  .pill {
    font-size: 11px; padding: 3px 9px; border-radius: 20px;
    background: var(--pill-bg); color: var(--pill-tx);
    border: 1px solid var(--pill-bd);
    text-decoration: none; cursor: pointer;
    transition: background .15s;
  }
  .pill:hover { background: var(--bot-bd); }

  /* ── Typing indicator ────────────────────────── */
  .typing { display: flex; gap: 4px; align-items: center; padding: 4px 2px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text3);
    animation: pulse 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%,80%,100%{opacity:.15} 40%{opacity:1} }

  /* ── Suggestions ─────────────────────────────── */
  .suggestions {
    padding: .5rem 1.25rem .75rem;
    display: flex; flex-wrap: wrap; gap: 6px;
    flex-shrink: 0;
  }
  .sug {
    font-size: 12px; padding: 5px 11px; border-radius: 20px;
    border: 1px solid var(--sug-bd);
    background: var(--sug-bg);
    color: var(--sug-tx);
    cursor: pointer; font-family: inherit;
    transition: all .15s;
  }
  .sug:hover { border-color: var(--blue-h); color: var(--pill-tx); background: var(--pill-bg); }

  /* ── Input bar ───────────────────────────────── */
  .input-bar {
    padding: .75rem 1.25rem;
    border-top: 1px solid var(--border);
    background: var(--surface2);
    display: flex; gap: 8px; align-items: center;
    flex-shrink: 0;
  }
  .input-bar input {
    flex: 1; padding: 9px 13px; border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text1);
    font-size: 13.5px; font-family: inherit;
    outline: none; transition: border-color .15s, box-shadow .15s;
  }
  .input-bar input:focus {
    border-color: var(--blue-h);
    box-shadow: 0 0 0 2px rgba(37,99,235,.2);
  }
  .input-bar input::placeholder { color: var(--text3); }
  .input-bar input:disabled { opacity: .5; cursor: not-allowed; }

  .send-btn {
    padding: 9px 16px; border-radius: var(--radius-sm); border: none;
    background: var(--blue); color: var(--blue-lt);
    font-size: 13.5px; font-weight: 500; font-family: inherit;
    cursor: pointer; transition: background .15s; white-space: nowrap;
  }
  .send-btn:hover:not(:disabled) { background: var(--blue-h); }
  .send-btn:disabled { background: var(--surface2); color: var(--text3); cursor: not-allowed; }

  /* ── Footer (shown in full web app mode) ─────── */
  .footer {
    margin-top: .75rem;
    font-size: 11px; color: var(--text3);
    text-align: center;
    display: none; /* hidden when embedded */
  }
  body.standalone .footer { display: block; }
</style>
</head>
<body>

<div class="app">
  <div class="card">

    <div class="header">
      <div class="badge">🧠</div>
      <div class="header-text">
        <div class="header-title">AiM BRAiN Assistant</div>
        <div class="header-sub">Powered by the AiM BRAiN knowledge base</div>
      </div>
      <div class="status-dot" id="statusDot" title="Online"></div>
    </div>

    <div class="chat" id="chat"></div>

    <div class="suggestions" id="suggestions"></div>

    <div class="input-bar">
      <input
        type="text"
        id="qInput"
        placeholder="Ask anything about AiM products..."
        autocomplete="off"
      />
      <button class="send-btn" id="sendBtn">Ask</button>
    </div>

  </div>
  <div class="footer">AiM BRAiN Assistant &mdash; Powered by Claude &amp; Notion</div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const SYSTEM = `You are the AiM BRAiN Assistant — an expert on AiM Sports motorsport data acquisition systems, RaceStudio software (RS2 and RS3), and related technical products. You help technicians and support staff with direct, practical answers.

Products you know: MyChron series (3, 4, 5, 5S, 6), Solo2, Solo2DL, MXx dashloggers, SmartyCam (HD, 3, 3 Dual), PDM, GS-Dash, IRM, expansion modules, RaceStudio 2 and 3, QT Utility, CAN bus (J1939, CANopen, XC1 files), GPS troubleshooting, firmware updates, data export, and general AiM support workflows.

Rules:
- Give the actual answer directly. Do not say "check the docs" or "refer to the manual."
- Be concise: 2-4 sentences for simple questions, a short paragraph for complex ones.
- For step-by-step procedures, number each step on its own line.
- If genuinely uncertain, say so briefly.
- Plain text only. No markdown. Use numbered lines for steps.`;

const SUGGESTIONS = [
  "How do I configure a MyChron6?",
  "Difference between Solo2 and Solo2DL?",
  "How do I fix a GPS error?",
  "How do I set up demo mode in RS3?",
  "What is CAN bus and how does AiM use it?",
  "How do I update firmware with QT Utility?",
];

const SOURCES = [
  { k:["mychron6","mychron 6","kart"],         t:"Configuring MyChron6",          u:"https://www.notion.so/161d2fd8ff058080a062c684e9be4c42" },
  { k:["solo2dl","difference between solo"],   t:"SOLO2 & SOLO2DL Compatibility",  u:"https://www.notion.so/fca482e45bbf435da343d8ceefde5b80" },
  { k:["gps error","gps fix","gps not"],       t:"MyChron5 / Solo2 GPS Error",     u:"https://www.notion.so/1b6d2fd8ff0580f1ba41c946f283c11b" },
  { k:["demo mode","rs3 demo","setup demo"],   t:"Demo Mode for RS3",              u:"https://www.notion.so/ce2e3c8203dd4f059865f208a36997c0" },
  { k:["can bus","canbus","j1939","canopen"],   t:"Intro to CAN",                   u:"https://www.notion.so/1f2d2fd8ff0580d789d4eb750987e07f" },
  { k:["firmware","qt utility","flash"],        t:"QT Utility Guide",               u:"https://www.notion.so/32fd2fd8ff058051bc14e082fa47ba43" },
  { k:["export","device explorer"],            t:"Guide to Export for AiM",        u:"https://www.notion.so/2de26da2e9ef443698915a1cfddbf355" },
  { k:["pdm","power distribution"],            t:"PDM Keypad Default Settings",    u:"https://www.notion.so/a59c11e63c8746fd94745b7c5f4776b9" },
  { k:["smartycam","camera"],                  t:"SmartyCam3 GPS Integration",     u:"https://www.notion.so/e4e5664087914caba7a54b2161d1d383" },
  { k:["part number"],                         t:"AiM Part Number Explanation",    u:"https://www.notion.so/e21156e40fc8496ea630c5fad8b1c887" },
  { k:["mxx","ecu not reading"],               t:"MXx ECU Not Reading",            u:"https://www.notion.so/32fd2fd8ff05807a9d72f2bd3f9cb6ef" },
  { k:["mychron5 board","5s board"],           t:"MyChron 5S Board Compatibility", u:"https://www.notion.so/4018092472c74c61ba639735befb6189" },
  { k:["intro to aim","what is aim"],          t:"Intro to AiM Sports",            u:"https://www.notion.so/1f2d2fd8ff0580febdecdbc93db0e968" },
  { k:["cfg conversion","3.81"],               t:"3.81.XX+ CFG Conversion Fixes",  u:"https://www.notion.so/294d2fd8ff0580a1bf2dc33870a2cccf" },
  { k:["xc1","can file"],                      t:"How to Import a .XC1 File",      u:"https://www.notion.so/160d2fd8ff0580e7b739e76c8cf2074a" },
  { k:["rs2","racestudio2"],                   t:"RS2 Quick Configuration",        u:"https://www.notion.so/8dc58ffcc62b44bca27306a34f3653e8" },
  { k:["button fix","button response"],        t:"MyChron5 Button Response Fix",   u:"https://www.notion.so/15fd2fd8ff05804b841fea7e386d0322" },
  { k:["solo2 booter","booter"],               t:"Solo 2 Booter Upgrade",          u:"https://www.notion.so/32fd2fd8ff05806ebe76cc0c856d9eac" },
];

// ── State ───────────────────────────────────────────────────────────────────
let history = [];
let loading = false;

// ── DOM refs ────────────────────────────────────────────────────────────────
const chatEl   = document.getElementById('chat');
const inputEl  = document.getElementById('qInput');
const sendBtn  = document.getElementById('sendBtn');
const sugsEl   = document.getElementById('suggestions');

// ── Init ─────────────────────────────────────────────────────────────────────
(function init() {
  // Detect if running standalone (not embedded)
  if (window.self === window.top) document.body.classList.add('standalone');

  // Welcome message
  appendMessage('bot', "Hey! Ask me anything about AiM products, RaceStudio, configuration, or troubleshooting. I'll give you a direct answer with links to relevant BRAiN articles.");

  // Suggestions
  SUGGESTIONS.forEach(text => {
    const btn = document.createElement('button');
    btn.className = 'sug';
    btn.textContent = text;
    btn.onclick = () => { sugsEl.style.display = 'none'; ask(text); };
    sugsEl.appendChild(btn);
  });

  // Event listeners
  sendBtn.onclick = () => ask();
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) ask(); });
})();

// ── Helpers ──────────────────────────────────────────────────────────────────
function scrollChat() { chatEl.scrollTop = chatEl.scrollHeight; }

function getSources(q) {
  const ql = q.toLowerCase();
  const matched = [];
  for (const s of SOURCES) {
    if (s.k.some(k => ql.includes(k))) matched.push(s);
    if (matched.length >= 3) break;
  }
  if (!matched.length) matched.push({ t: 'Browse AiM BRAiN', u: 'https://www.notion.so/53146e69775e47f59c26005687109f0d' });
  return matched;
}

function appendMessage(role, text, sources) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + (role === 'user' ? 'user' : '');

  const av = document.createElement('div');
  av.className = 'avatar ' + role;
  av.textContent = role === 'bot' ? '🧠' : 'U';

  const content = document.createElement('div');
  content.className = 'msg-content';

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + role;
  bubble.textContent = text;
  content.appendChild(bubble);

  if (sources && sources.length) {
    const srcRow = document.createElement('div');
    srcRow.className = 'sources';
    sources.forEach(s => {
      const a = document.createElement('a');
      a.className = 'pill'; a.href = s.u; a.target = '_blank';
      a.rel = 'noreferrer'; a.textContent = s.t;
      srcRow.appendChild(a);
    });
    content.appendChild(srcRow);
  }

  if (role === 'user') { row.appendChild(content); row.appendChild(av); }
  else                 { row.appendChild(av);      row.appendChild(content); }

  chatEl.appendChild(row);
  scrollChat();
  return bubble;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row'; row.id = 'typing-row';
  const av = document.createElement('div');
  av.className = 'avatar bot'; av.textContent = '🧠';
  const content = document.createElement('div');
  content.className = 'msg-content';
  const bubble = document.createElement('div');
  bubble.className = 'bubble bot';
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  content.appendChild(bubble);
  row.appendChild(av); row.appendChild(content);
  chatEl.appendChild(row); scrollChat();
}

function hideTyping() {
  const el = document.getElementById('typing-row');
  if (el) el.remove();
}

function setLoading(on) {
  loading = on;
  sendBtn.disabled = on || !inputEl.value.trim();
  inputEl.disabled = on;
}

// ── Ask ───────────────────────────────────────────────────────────────────────
async function ask(preset) {
  const q = (preset || inputEl.value).trim();
  if (!q || loading) return;

  sugsEl.style.display = 'none';
  inputEl.value = '';
  sendBtn.disabled = true;

  appendMessage('user', q);
  history.push({ role: 'user', content: q });
  setLoading(true);
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: history
      })
    });

    const data = await res.json();
    hideTyping();

    if (data.error) throw new Error(data.error.message);

    const text = (data.content || [])
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('');

    history.push({ role: 'assistant', content: text });
    appendMessage('bot', text, getSources(q));

  } catch (err) {
    hideTyping();
    history.pop();
    appendMessage('bot', '⚠️ Could not connect: ' + (err.message || 'Unknown error') + '. Please try again.');
    document.getElementById('statusDot').style.background = '#ef4444';
  }

  setLoading(false);
  inputEl.focus();
}

// Update send button state on input
inputEl.addEventListener('input', () => {
  sendBtn.disabled = loading || !inputEl.value.trim();
});
</script>
</body>
</html>
